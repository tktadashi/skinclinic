<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOR YOU</title>
    <script>
      let _fetch = window.fetch;
      Object.defineProperty(window, 'fetch', {
        get: function() { return _fetch; },
        set: function(f) { 
          console.warn("Prevented generic fetch override"); 
          _fetch = f; 
        },
        configurable: true,
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
